name: Frontend CI and Publish to ACR
 
on:
  push:
    branches:
      - main
 
  # Allows you to test the workflow manually.
  workflow_dispatch:
 
permissions:
  contents: read
  id-token: write
 
env:
  IMAGE_REPOSITORY: ${{ vars.ACR_LOGIN_SERVER }}/${{ vars.ACR_FRONTEND_REPOSITORY }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_CLIENT_ID || vars.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID != '' && secrets.AZURE_TENANT_ID || vars.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID != '' && secrets.AZURE_SUBSCRIPTION_ID || vars.AZURE_SUBSCRIPTION_ID }}
  GITOPS_REPOSITORY: ClusterSage/ClusterSage-gitops
  GITOPS_VALUES_FILE: environments/prod/values/clustersage-values.yaml
 
jobs:
  validate:
    name: Lint, Test and Build
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
 
      - name: Install dependencies
        run: npm ci
 
      - name: Run lint
        run: npm run lint
 
      - name: Run typecheck
        run: npm run typecheck --if-present
 
      - name: Run tests
        run: npm run test --if-present
 
      - name: Build frontend
        run: npm run build
 
  docker:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: validate
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Azure workflow configuration
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${AZURE_CLIENT_ID}" ] || { echo "Missing AZURE_CLIENT_ID. Add it as an org/repo secret or variable."; exit 1; }
          [ -n "${AZURE_TENANT_ID}" ] || { echo "Missing AZURE_TENANT_ID. Add it as an org/repo secret or variable."; exit 1; }
          [ -n "${AZURE_SUBSCRIPTION_ID}" ] || { echo "Missing AZURE_SUBSCRIPTION_ID. Add it as an org/repo secret or variable."; exit 1; }
          [ -n "${{ vars.ACR_NAME }}" ] || { echo "Missing ACR_NAME variable."; exit 1; }
          [ -n "${{ vars.ACR_LOGIN_SERVER }}" ] || { echo "Missing ACR_LOGIN_SERVER variable."; exit 1; }
          [ -n "${{ vars.ACR_FRONTEND_REPOSITORY }}" ] || { echo "Missing ACR_FRONTEND_REPOSITORY variable."; exit 1; }

      - name: Log in to Azure using GitHub OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
 
      - name: Log in to Azure Container Registry
        run: |
          az acr login --name "${{ vars.ACR_NAME }}"

      - name: Set short SHA
        shell: bash
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPOSITORY }}
          tags: |
            type=raw,value=${{ env.SHORT_SHA }}
          labels: |
            org.opencontainers.image.title=ClusterSage Frontend
            org.opencontainers.image.description=ClusterSage frontend container image
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
 
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
 
      - name: Show published image
        run: |
          echo "Published image:"
          echo "${{ env.IMAGE_REPOSITORY }}:${{ env.SHORT_SHA }}"

      - name: Validate GitOps promotion configuration
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${{ secrets.GITOPS_REPO_TOKEN }}" ] || { echo "Missing GITOPS_REPO_TOKEN secret."; exit 1; }

      - name: Install yq
        shell: bash
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPOSITORY }}
          ref: main
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops

      - name: Promote frontend image tag in GitOps
        shell: bash
        run: |
          set -euo pipefail
          cd gitops
          export SHORT_SHA="${SHORT_SHA}"
          yq -i '.frontend.image.tag = env(SHORT_SHA)' "${GITOPS_VALUES_FILE}"
          if git diff --quiet -- "${GITOPS_VALUES_FILE}"; then
            echo "No GitOps change required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${GITOPS_VALUES_FILE}"
          git commit -m "Promote frontend image to ${SHORT_SHA}"
          git push origin HEAD:main
 
 
